          metadata:
            type: object
          spec:
            description: |-
              spec defines the specification of desired Service selection for target discovery by
              Prometheus.
            properties:
              attachMetadata:
                description: |-
                  attachMetadata defines additional metadata which is added to the
                  discovered targets.

                  It requires Prometheus >= v2.37.0.
                properties:
