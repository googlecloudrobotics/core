# Used to generate the app-ingress-generated.yaml file.
# After making changes, regenerate with
#
# sys-cluster/ingress-istio/files/update_istio_yaml.sh
#
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
spec:
  # The "default" profile includes the ingress gateway.
  profile: default

  values:
    global:
      logging:
        level: all:warn
      # Override the default namespace (istio-system) because we will wrap this YAML in a
      # ChartAssignment, and the controller will install to the default namespace.
      istioNamespace: default
    pilot:
      env:
        PILOT_ENABLE_MULTIPLE_CUSTOM_AUTHZ_PROVIDERS: "true"

  meshConfig:
    defaultConfig:
      proxyMetadata: {}
    enablePrometheusMerge: true

    accessLogFile: "/dev/stdout"
    accessLogFormat: |
      {"authority": "%REQ(:AUTHORITY)%", "start_time": "%START_TIME%", "bytes_received": "%BYTES_RECEIVED%", "bytes_sent": "%BYTES_SENT%", "downstream_local_address": "%DOWNSTREAM_LOCAL_ADDRESS%", "downstream_remote_address": "%DOWNSTREAM_REMOTE_ADDRESS%", "duration": "%DURATION%", "istio_policy_status": "%DYNAMIC_METADATA(istio.mixer:status)%", "method": "%REQ(:METHOD)%", "path": "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%", "protocol": "%PROTOCOL%", "request_id": "%REQ(X-REQUEST-ID)%", "requested_server_name": "%REQUESTED_SERVER_NAME%", "response_code": "%RESPONSE_CODE%", "response_flags": "%RESPONSE_FLAGS%", "route_name": "%ROUTE_NAME%", "start_time": "%START_TIME%", "upstream_cluster": "%UPSTREAM_CLUSTER%", "upstream_host": "%UPSTREAM_HOST%", "upstream_local_address": "%UPSTREAM_LOCAL_ADDRESS%", "upstream_service_time": "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%", "upstream_transport_failure_reason": "%UPSTREAM_TRANSPORT_FAILURE_REASON%", "user_agent": "%REQ(USER-AGENT)%", "x_forwarded_for": "%REQ(X-FORWARDED-FOR)%", "x_icon_instance_name": "%REQ(x-icon-instance-name)%", "x_resource_instance_name": "%REQ(x-resource-instance-name)%"}
    # Baseline Debugging for ensonic/istio:
    # The PILOT_ENABLE_MULTIPLE_CUSTOM_AUTHZ_PROVIDERS flag is applied to Istiod.
    # However, Istiod still reports 'only 1 provider can be used per workload'.
    # This suggests a possible version limitation or a requirement that providers 
    # be referenced in a specific way when multiple are used.
    extensionProviders:
    - name: "token-vendor-robot-and-human-auth"
      envoyExtAuthzHttp:
        service: "token-vendor.app-token-vendor.svc.cluster.local"
        port: "80"
        pathPrefix: "/apis/core.token-vendor/v1/token.verify?robots=true;origin="
        # Force Envoy to use GET instead of POST for the verification check
        withRequestBody:
          maxRequestBytes: 0
          packAsBytes: false
        includeRequestHeadersInCheck: 
        - "authorization"
        - "x-forwarded-access-token"
        - "x-auth-url"
        headersToUpstreamOnAllow:
        - "authorization"
    # - name: "token-vendor-human-auth"
    #   envoyExtAuthzHttp:
    #     service: "token-vendor.app-token-vendor.svc.cluster.local"
    #     port: "80"
    #     pathPrefix: "/apis/core.token-vendor/v1/token.verify?robots=false"
    #     headersToUpstreamOnAllow: ["authorization"]
    #     includeRequestHeadersInCheck: 
    #       - "authorization"
    #       - "x-forwarded-access-token"

  components:
    base:
      enabled: true
    cni:
      enabled: false
    pilot:
      enabled: true
    ingressGateways:
      - name: istio-ingressgateway
        enabled: false
