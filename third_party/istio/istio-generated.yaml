    istio: istiod
    istio.io/rev: default
    release: istio
  name: istio-validator-default
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: istiod
        namespace: default
        path: /validate
    failurePolicy: Ignore
    name: rev.validation.istio.io
    objectSelector:
      matchExpressions:
        - key: istio.io/rev
          operator: In
          values:
            - default
    rules:
      - apiGroups:
          - security.istio.io
          - networking.istio.io
          - telemetry.istio.io
          - extensions.istio.io
        apiVersions:
          - '*'
        operations:
          - CREATE
          - UPDATE
        resources:
          - '*'
    sideEffects: None
