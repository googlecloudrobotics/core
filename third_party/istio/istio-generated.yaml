                        description: One or more labels associated with the endpoint.
                        maxProperties: 256
                        type: object
                      locality:
                        description: The locality associated with the endpoint.
                        maxLength: 2048
                        type: string
                      network:
                        description: Network enables Istio to group endpoints resident
