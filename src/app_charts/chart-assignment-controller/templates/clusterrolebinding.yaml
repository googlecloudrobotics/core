{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "chart-assignment-controller.fullname" . }}
  labels:
    {{- include "chart-assignment-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  {{- if .Values.rbac.clusterAdmin }}
  name: cluster-admin
  {{- else }}
  name: {{ include "chart-assignment-controller.fullname" . }}
  {{- end }}
subjects:
- kind: ServiceAccount
  name: {{ include "chart-assignment-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
