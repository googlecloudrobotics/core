{{- if .Values.installCRDs -}}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chartassignments.apps.cloudrobotics.com
  annotations:
    cr-syncer.cloudrobotics.com/spec-source: cloud
    cr-syncer.cloudrobotics.com/filter-by-robot-name: "True"
    helm.sh/resource-policy: keep
spec:
  group: apps.cloudrobotics.com
  names:
    kind: ChartAssignment
    plural: chartassignments
    singular: chartassignment
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
      - jsonPath: .status.phase
        name: Phase
        type: string
      - jsonPath: .status.observedGeneration
        name: Generation
        type: integer
      - jsonPath: .metadata.creationTimestamp
        name: Age
        type: date
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                clusterName:
                  type: string
                namespaceName:
                  type: string
                chart:
                  type: object
                  properties:
                    repository:
                      type: string
                    name:
                      type: string
                    version:
                      type: string
                    inline:
                      type: string
                    values:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      lastUpdateTime:
                        type: string
                        format: date-time
                      lastTransitionTime:
                        type: string
                        format: date-time
                      status:
                        type: string
                      type:
                        type: string
                      message:
                        type: string
                phase:
                  type: string
{{- end }}
