apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart-assignment-controller.fullname" . }}
  labels:
    {{- include "chart-assignment-controller.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "chart-assignment-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chart-assignment-controller.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chart-assignment-controller.fullname" . }}
      containers:
        - name: chart-assignment-controller
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ROBOT_NAME
              value: {{ .Values.robotName | quote }}
          args:
            - --cloud-cluster={{ .Values.cloudCluster }}
            - --webhook-enabled={{ .Values.webhook.enabled }}
            - --webhook-port=9876
            {{- if .Values.webhook.enabled }}
            - --cert-dir=/tls
            {{- end }}
          ports:
            - name: webhook
              containerPort: 9876
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          {{- if .Values.webhook.enabled }}
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          {{- end }}
      volumes:
        {{- if .Values.webhook.enabled }}
        - name: tls
          secret:
            secretName: {{ include "chart-assignment-controller.fullname" . }}-tls
        {{- end }}
