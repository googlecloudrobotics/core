{{- if .Values.webhook.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart-assignment-controller.fullname" . }}
  labels:
    {{- include "chart-assignment-controller.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: webhook
      protocol: TCP
      name: webhook
  selector:
    {{- include "chart-assignment-controller.selectorLabels" . | nindent 4 }}
{{- end }}
