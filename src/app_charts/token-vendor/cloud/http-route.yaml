{{- range list "" "-auth" }}
{{- $sectionName := "https" }}{{ if eq . "-auth" }}{{ $sectionName = "http" }}{{ end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: public-key-access{{.}}
spec:
  hostnames:
  - {{ $.Values.domain }}
  parentRefs:
  - name: crc{{.}}-gateway
    namespace: default
    sectionName: {{ $sectionName }}
  rules:
  - backendRefs:
    - name: token-vendor
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/public-key.read
{{- if eq . "-auth" }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /apis/core.token-vendor/v1/token.verify?robots=true
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: public-key-manager{{.}}
spec:
  hostnames:
  - {{ $.Values.domain }}
  parentRefs:
  - name: crc{{.}}-gateway
    namespace: default
    sectionName: {{ $sectionName }}
  rules:
  - backendRefs:
    - name: token-vendor
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/public-key.configure
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/public-key.publish
{{- if eq . "-auth" }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /apis/core.token-vendor/v1/token.verify?robots=false
{{- end }}
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: token-vendor
spec:
  hostnames:
  - {{ .Values.domain }}
  parentRefs:
  - name: crc-gateway
    namespace: default
    sectionName: https
  rules:
  - backendRefs:
    - name: token-vendor
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/token.verify
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/jwt.verify
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/token.oauth2
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: token-vendor-auth-bypass
spec:
  hostnames:
  - {{ .Values.domain }}
  parentRefs:
  - name: crc-auth-gateway
    namespace: default
    sectionName: http
  rules:
  - backendRefs:
    - name: crc-auth-gateway-catchall-svc
      namespace: default
      port: 8080
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          replaceFullPath: /status/200
          type: ReplaceFullPath
    matches:
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/token.verify
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/jwt.verify
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/token.oauth2
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: token-vendor-grant
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: app-k8s-relay
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: app-prometheus-relay
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: app-prometheus
  to:
  - group: ""
    kind: Service
    name: token-vendor
