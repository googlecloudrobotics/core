{{- range list "" "-auth" }}
{{- $sectionName := "https" }}{{ if eq . "-auth" }}{{ $sectionName = "http" }}{{ end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: public-key-access{{.}}
spec:
  hostnames:
  - {{ $.Values.domain }}
  parentRefs:
  - name: crc{{.}}-gateway
    namespace: default
    sectionName: {{ $sectionName }}
  rules:
  - backendRefs:
    - name: token-vendor
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/public-key.read
{{- if eq . "-auth" }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /apis/core.token-vendor/v1/token.verify?robots=true
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: public-key-manager{{.}}
spec:
  hostnames:
  - {{ $.Values.domain }}
  parentRefs:
  - name: crc{{.}}-gateway
    namespace: default
    sectionName: {{ $sectionName }}
  rules:
  - backendRefs:
    - name: token-vendor
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/public-key.configure
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/public-key.publish
{{- if eq . "-auth" }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /apis/core.token-vendor/v1/token.verify?robots=false
{{- end }}
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: token-vendor
spec:
  hostnames:
  - {{ .Values.domain }}
  parentRefs:
  - name: crc-gateway
    namespace: default
    sectionName: https
  rules:
  - backendRefs:
    - name: token-vendor
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/token.verify
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/jwt.verify
    - path:
        type: PathPrefix
        value: /apis/core.token-vendor/v1/token.oauth2
---
