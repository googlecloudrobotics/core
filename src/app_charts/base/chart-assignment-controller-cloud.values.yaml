image:
  repository: '{{ .Values.registry }}{{ splitList `@` .Values.images.chart_assignment_controller | first }}'
  digest: '{{ splitList `@` .Values.images.chart_assignment_controller | last }}'
cloudCluster: true
robotName: ""
extraAllowedNamespaces: '{{ .Values.chart_assignment_controller.extra_allowed_namespaces }}'
webhook:
  enabled: true
rbac:
  create: true
  clusterAdmin: true

resources:
  requests:
    memory: "100Mi"
