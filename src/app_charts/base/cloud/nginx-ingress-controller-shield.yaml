{{- if and (eq .Values.use_nginx_shield "true") (eq .Values.use_istio "false") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k8s-app: nginx-ingress-controller-shield
  name: nginx-ingress-controller-shield
  namespace: default
spec:
  selector:
    matchLabels:
      k8s-app: nginx-ingress-controller-shield
  template:
    metadata:
      labels:
        k8s-app: nginx-ingress-controller-shield
      annotations:
        checksum/nginx-config-map: {{ include (print $.Template.BasePath "/nginx-ingress-controller-shield-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: ingress-nginx
      shareProcessNamespace: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: cert-loader
        image: alpine:3.21.7
        restartPolicy: Always
        command: ["/bin/sh", "-c", "/scripts/loader.sh"]
        startupProbe:
          exec:
            command:
            - cat
            - /tmp/nginx/nginx.conf
          periodSeconds: 1
          failureThreshold: 30
        volumeMounts:
        - name: certs-default
          mountPath: /etc/nginx/certs
          readOnly: true
        - name: script
          mountPath: /scripts
        - name: config
          mountPath: /nginx-templates
          readOnly: true
        - name: nginx-conf
          mountPath: /tmp/nginx
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          capabilities:
            drop:
            - ALL
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.31.2-alpine
        command: ["nginx", "-g", "daemon off;", "-c", "/tmp/nginx/nginx.conf"]
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        - containerPort: 443
          name: https
          protocol: TCP
        livenessProbe:
          failureThreshold: 5
          tcpSocket:
            port: http
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe:
          failureThreshold: 3
          tcpSocket:
            port: http
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          requests:
            cpu: "1"
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_BIND_SERVICE
            drop:
            - ALL
        volumeMounts:
        - name: certs-default
          mountPath: /etc/nginx/certs
          readOnly: true
        - name: nginx-conf
          mountPath: /tmp/nginx
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: nginx-ingress-controller-shield
      - name: script
        configMap:
          name: nginx-ingress-controller-shield
          defaultMode: 0755
      - name: nginx-conf
        emptyDir: {}
      - name: certs-default
        secret:
          secretName: tls
          optional: true
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-ingress-controller-shield-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-ingress-controller-shield
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress-controller-internal
  labels:
    app: nginx-ingress-controller-internal
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - appProtocol: HTTP
    name: http
    port: 80
    protocol: TCP
    targetPort: 80
  - appProtocol: HTTPS
    name: https
    port: 443
    protocol: TCP
    targetPort: 443
  selector:
    k8s-app: nginx-ingress-controller
  sessionAffinity: None
  type: ClusterIP
{{- end}}
