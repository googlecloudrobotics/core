{{- if eq .Values.use_istio "true" }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: crc-gateway
  annotations:
    # Use standard K8s annotations for cloud-specific LB settings
    networking.istio.io/service-type: LoadBalancer
    networking.istio.io/service-externalTrafficPolicy: Local
spec:
  gatewayClassName: istio # Provisions Istio-managed LB infrastructure
  addresses:
  - value: {{ .Values.ingress_ip }}
    type: IPAddress
  listeners:
  - name: http
    hostname: {{ .Values.domain }}
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    hostname: {{ .Values.domain }}
    protocol: HTTPS
    port: 443
    tls:
      mode: Terminate
      certificateRefs:
      - name: tls
        kind: Secret
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
spec:
  parentRefs:
  - name: crc-gateway
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: crc-auth-gateway
  annotations:
    networking.istio.io/service-type: ClusterIP # only require internal cluster ip
spec:
  gatewayClassName: istio # Provisions Istio-managed LB
  listeners:
    - name: http
      hostname: {{ .Values.domain }}
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: crc-gateway-auth
spec:
  targetRefs: # assoc this global auth policy on external crc-gateway
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: crc-gateway
  action: CUSTOM
  provider:
    name: "crc-auth-gateway" # Must match name in meshConfig.extensionProviders exactly.
  rules:
  # targeting all paths.
  # it is also possible to specify the relevant paths here, so that not all requests will be daisy-chained
  - {}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crc-auth-catchall
spec:
  parentRefs:
  - name: crc-auth-gateway
    namespace: default
    sectionName: http
  hostnames:
  - {{ .Values.domain }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: crc-auth-gateway-catchall-svc
      namespace: default
      port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crc-auth-gateway-catchall-svc
  labels:
    app: crc-auth-gateway-catchall-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crc-auth-gateway-catchall-svc
  template:
    metadata:
      labels:
        app: crc-auth-gateway-catchall-svc
    spec:
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.31.1-alpine
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo 'server {
              listen 8080;
              location / {
                  add_header Content-Type text/plain;
                  return 404 "Not Found\n";
              }
          }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
---
apiVersion: v1
kind: Service
metadata:
  name: crc-auth-gateway-catchall-svc
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: crc-auth-gateway-catchall-svc
{{- end}}
