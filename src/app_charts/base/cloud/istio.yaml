{{- if eq .Values.use_istio "true" }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: crc-gateway
  annotations:
    # Use standard K8s annotations for cloud-specific LB settings
    networking.istio.io/service-type: LoadBalancer 
    networking.istio.io/service-externalTrafficPolicy: Local
spec:
  gatewayClassName: istio # Provisions Istio-managed LB infrastructure
  addresses:
  - value: {{ .Values.ingress_ip }}
    type: IPAddress
  listeners:
  - name: http
    hostname: {{ .Values.domain }}
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    hostname: {{ .Values.domain }}
    protocol: HTTPS
    port: 443
    tls:
      mode: Terminate
      certificateRefs:
      - name: tls
        kind: Secret
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
spec:
  parentRefs:
  - name: crc-gateway
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata: 
  name: crc-auth-gateway
  annotations:
    networking.istio.io/service-type: ClusterIP # only require internal cluster ip
spec: 
  gatewayClassName: istio # Provisions Istio-managed LB 
  listeners:
    - name: http
      hostname: {{ .Values.domain }}
      protocol: HTTP
      port: 8080
      allowedRoutes: 
        namespaces:
          from: All
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: crc-gateway-auth
spec:
  targetRefs: # assoc this global auth policy on external crc-gateway
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: crc-gateway
  action: CUSTOM
  provider:
    name: "crc-auth-gateway" # Must match name in meshConfig.extensionProviders exactly.
  rules: # all paths are impacted
  - {}
{{- end}}
