{{- if eq .Values.use_istio "true" }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: crc-gateway
  annotations:
    # Use standard K8s annotations for cloud-specific LB settings
    networking.istio.io/service-type: LoadBalancer
    networking.istio.io/service-externalTrafficPolicy: Local
spec:
  gatewayClassName: istio # Provisions Istio-managed LB infrastructure
  addresses:
  - value: {{ .Values.ingress_ip }}
    type: IPAddress
  listeners:
  - name: http
    hostname: {{ .Values.domain }}
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    hostname: {{ .Values.domain }}
    protocol: HTTPS
    port: 443
    tls:
      mode: Terminate
      certificateRefs:
      - name: tls
        kind: Secret
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
spec:
  parentRefs:
  - name: crc-gateway
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: crc-auth-gateway
  annotations:
    networking.istio.io/service-type: ClusterIP # only require internal cluster ip
spec:
  gatewayClassName: istio # Provisions Istio-managed LB
  listeners:
    - name: http
      hostname: {{ .Values.domain }}
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: crc-gateway-auth
spec:
  targetRefs: # assoc this global auth policy on external crc-gateway
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: crc-gateway
  action: CUSTOM
  provider:
    name: "crc-auth-gateway" # Must match name in meshConfig.extensionProviders exactly.
  rules:
  # targeting all paths.
  # it is also possible to specify the relevant paths here, so that not all requests will be daisy-chained
  - {}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crc-auth-catchall
spec:
  parentRefs:
  - name: crc-auth-gateway
    namespace: default
    sectionName: http
  hostnames:
  - {{ .Values.domain }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: crc-auth-gateway-catchall-svc
      namespace: default
      port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crc-auth-gateway-catchall-svc
  labels:
    app: crc-auth-gateway-catchall-svc
spec:
  selector:
    matchLabels:
      app: crc-auth-gateway-catchall-svc
  template:
    metadata:
      labels:
        app: crc-auth-gateway-catchall-svc
    spec:
      containers:
      - name: catchall
        image: {{ .Values.registry }}{{ .Values.images.status_echo_server }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        args:
        - --port=8080
        - --http_status=404
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          requests:
            cpu: "1.0"
            memory: "32Mi"
          limits:
            cpu: "1.5"
            memory: "64Mi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          privileged: false
          capabilities:
              drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crc-auth-gateway-catchall-pdb
spec:
  maxUnavailable: 33%
  selector:
    matchLabels:
      app: crc-auth-gateway-catchall-svc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crc-auth-gateway-catchall-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crc-auth-gateway-catchall-svc
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: v1
kind: Service
metadata:
  name: crc-auth-gateway-catchall-svc
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: crc-auth-gateway-catchall-svc
---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: crc-auth-signin
  namespace: istio-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: crc-auth-gateway
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
            subFilter:
              name: envoy.filters.http.router
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.lua.crc_auth_signin
        typed_config:
          "@type": "type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua"
          inlineCode: |
            local STATUS_302 = "302"
            local LOCATION_H = "location"
            local X_AUTH_SIGNIN_H = "x-crc-auth-signin"

            local DEFAULT_SIGNIN_URL = "{{ .Values.signin_url }}"
            local DYNAMIC_METADATA_NAMESPACE = "envoy.filters.http.lua"

            local function url_encode(str)
              if not str or str == "" then
                return str
              end

              str = string.gsub(str, "([^A-Za-z0-9_.-])", function(c)
                return string.format("%%%02X", string.byte(c))
              end)
              return str
            end

            function envoy_on_request(request_handle)
              -- Remove the internal redirect header so it doesn't leak to the client
              request_handle:headers():remove(X_AUTH_SIGNIN_H)

              local path = request_handle:headers():get(":path")
              request_handle:streamInfo():dynamicMetadata():set(DYNAMIC_METADATA_NAMESPACE, "request_path", path)
            end

            function envoy_on_response(response_handle)
              local status = response_handle:headers():get(":status")

              if status ~= "403" and status ~= "401" then
                -- Only redirect 401 (Unauthorized) and 403 (Forbidden) responses;
                -- let all other statuses pass through.
                return
              end

              -- Read and remove the internal redirect header so it doesn't leak to the client
              local auth_signin_url = response_handle:headers():get(X_AUTH_SIGNIN_H)
              if auth_signin_url then
                response_handle:headers():remove(X_AUTH_SIGNIN_H)
              end

              if not auth_signin_url or auth_signin_url == "" then
                auth_signin_url = DEFAULT_SIGNIN_URL
              end

              -- Substitute $escaped_request_uri in the redirect URL
              local meta = response_handle:streamInfo():dynamicMetadata():get(DYNAMIC_METADATA_NAMESPACE)
              local request_path = meta and meta["request_path"]
              if request_path then
                local escaped_path = url_encode(request_path)
                auth_signin_url = string.gsub(auth_signin_url, "%$escaped_request_uri", function() return escaped_path end)
              end

              response_handle:headers():replace(":status", STATUS_302)
              response_handle:headers():add(LOCATION_H, auth_signin_url)
            end
{{- end}}
