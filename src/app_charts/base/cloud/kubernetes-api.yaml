{{- if eq .Values.onprem_federation "true" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubernetes-api
  annotations:
    nginx.ingress.kubernetes.io/auth-url: http://cr-syncer-auth-webhook.default.svc.cluster.local/auth
    nginx.ingress.kubernetes.io/auth-response-headers: Authorization
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"  # seconds
    nginx.ingress.kubernetes.io/client-body-buffer-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.domain }}
    http:
      paths:
      - path: /apis/core.kubernetes($|/)(.*)
        pathType: Prefix
        backend:
          service:
            name: kubernetes
            port:
              number: 443
---
{{- range list "" "-auth" }}
{{- $sectionName := "https" }}{{ if eq . "-auth" }}{{ $sectionName = "http" }}{{ end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-api{{ . }}
spec:
  hostnames:
  - {{ $.Values.domain }}
  parentRefs:
  - name: crc{{ . }}-gateway
    namespace: default
    sectionName: {{ $sectionName }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /apis/core.kubernetes
{{- if eq . "-auth" }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /auth
    backendRefs:
    - name: cr-syncer-auth-webhook
      port: 80
{{- else }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: kubernetes
      port: 443
{{- end }}
---
{{- end }}
{{- end }}
