{{- range list "" "-auth" }}
{{- $sectionName := "https" }}{{ if eq . "-auth" }}{{ $sectionName = "http" }}{{ end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana{{ . }}
  labels:
    app.kubernetes.io/name: {{ $.Chart.Name }}
spec:
  hostnames:
  - {{ $.Values.domain }}
  parentRefs:
  - name: crc{{ . }}-gateway
    namespace: default
    sectionName: {{ $sectionName }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /grafana
{{- if eq . "-auth" }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: {{ tpl $.Values.gf_ingress_auth_url $ }}
    backendRefs:
    - name: oauth2-proxy
      port: 80
{{- else }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: prom-grafana
      port: 80
{{- end }}
---
{{- end }}
